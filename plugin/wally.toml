[package]
name = "morgann1/studio-discover"
description = "A Roblox Studio plugin for browsing and installing Wally packages."
version = "3.7.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
private = true

[place]
shared-packages = "game.ReplicatedStorage.Packages"
server-packages = "game.ServerScriptService.Packages"

[dependencies]
React = "jsdotlua/react@17.2.1"
ReactRoblox = "jsdotlua/react-roblox@17.2.1"
zzlib = "morgann1/zzlib@0.1.0"
Cryo = "morgann1/cryo@1.1.0"
ReactCharm = "littensy/react-charm@0.3.0"
Charm = "littensy/charm@0.10.0"
Promise = "evaera/promise@4.0.0"
SharedToolbar = "morgann1/shared-toolbar@0.2.1"
GreenTea = "corecii/greentea@0.4.11"

[dev-dependencies]
Jest = "jsdotlua/jest@3.10.0"
JestGlobals = "jsdotlua/jest-globals@3.10.0"