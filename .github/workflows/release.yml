name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

# rbxasset merged its Lute rewrite but hasn't cut a release yet, so we pin to
# the merge commit. Bump when they publish a tagged version.
env:
  RBXASSET_REF: 604394e

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Resolve tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 📦 Install packages
        run: lute run install

      - name: 🏗️ Build StudioDiscover.rbxm
        run: lute run build

      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-rbxm
          path: StudioDiscover.rbxm
          retention-days: 7

      - name: 📝 Build release notes
        id: notes
        run: |
          TAG="${{ steps.meta.outputs.tag }}"

          PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            URL="${{ github.server_url }}/${{ github.repository }}/compare/$PREV...$TAG"
          else
            URL="${{ github.server_url }}/${{ github.repository }}/commits/$TAG"
          fi

          SECTION=$(lute run release-notes --tag "$TAG")

          {
            echo "body<<RELEASE_EOF"
            echo "$SECTION"
            echo ""
            echo "---"
            echo ""
            echo "**Full changelog**: $URL"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🚀 Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: StudioDiscover.rbxm
          body: ${{ steps.notes.outputs.body }}

  publish-creator-store:
    name: Publish to Creator Store
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: creator-store-production
    environment:
      name: roblox-creator-store
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⬇️ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-rbxm

      - name: 🧰 Vendor rbxasset
        run: |
          git clone https://github.com/Roblox/rbxasset.git .github/scripts/rbxasset
          cd .github/scripts/rbxasset
          git checkout "$RBXASSET_REF"
          lute run install

      - name: ☁️ Publish to Creator Store
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ROBLOX_API_KEY}" ]; then
            echo "::error::Required secret ROBLOX_API_KEY is not set"
            exit 1
          fi
          lute run .github/scripts/publish production
