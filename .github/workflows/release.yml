name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Install packages
        run: lune run install

      - name: 🏗️ Build Discover.rbxm
        run: rojo build plugin/default.project.json -o Discover.rbxm

      - name: 🔗 Build commits link
        id: commits
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            URL="${{ github.server_url }}/${{ github.repository }}/compare/$PREV...$TAG"
          else
            URL="${{ github.server_url }}/${{ github.repository }}/commits/$TAG"
          fi
          {
            echo "body<<EOF"
            echo "See full commits here: $URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🚀 Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: Discover.rbxm
          body: ${{ steps.commits.outputs.body }}
