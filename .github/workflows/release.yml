name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install packages
        run: wally install

      - name: Build Discover.rbxm
        run: rojo build -o Discover.rbxm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Discover.rbxm
