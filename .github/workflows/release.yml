name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Install Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Resolve tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 📦 Install packages
        run: lute run install

      - name: 🏗️ Build StudioDiscover.rbxm
        run: lute run build

      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-rbxm
          path: StudioDiscover.rbxm
          retention-days: 7

      - name: 📝 Build release notes
        id: notes
        run: |
          TAG="${{ steps.meta.outputs.tag }}"

          PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            URL="${{ github.server_url }}/${{ github.repository }}/compare/$PREV...$TAG"
          else
            URL="${{ github.server_url }}/${{ github.repository }}/commits/$TAG"
          fi

          SECTION=$(lute run release-notes --tag "$TAG")

          {
            echo "body<<RELEASE_EOF"
            echo "$SECTION"
            echo ""
            echo "---"
            echo ""
            echo "**Full changelog**: $URL"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🚀 Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: StudioDiscover.rbxm
          body: ${{ steps.notes.outputs.body }}

  publish-creator-store:
    name: Publish to Creator Store
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency: creator-store-production
    environment:
      name: roblox-creator-store
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: ⬇️ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-rbxm

      - name: ☁️ Publish to Creator Store
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${ROBLOX_API_KEY}" ]; then
            echo "::error::Required secret ROBLOX_API_KEY is not set"
            exit 1
          fi

          ASSET_ID=$(awk -F'"' '/^assetId/ { print $2; exit }' rbxasset.lock)
          if [ -z "${ASSET_ID}" ] || [ "${ASSET_ID}" = "0" ]; then
            echo "::error::assetId is not set in rbxasset.lock"
            exit 1
          fi
          echo "Publishing ${TAG} to Creator Store asset ${ASSET_ID}"

          http_status=0
          response=$(curl -sS -w '\n%{http_code}' \
            -X PATCH "https://apis.roblox.com/assets/v1/assets/${ASSET_ID}" \
            -H "x-api-key: ${ROBLOX_API_KEY}" \
            -F "request={\"assetId\":\"${ASSET_ID}\"}" \
            -F 'fileContent=@StudioDiscover.rbxm;type=application/octet-stream')
          http_status=$(tail -n1 <<<"$response")
          body=$(sed '$d' <<<"$response")
          if [ "$http_status" != "200" ]; then
            echo "::error::Open Cloud PATCH returned $http_status: $body"
            exit 1
          fi

          operation_id=$(jq -r '.operationId // (.path | capture("operations/(?<id>.+)").id // empty)' <<<"$body")
          if [ -z "$operation_id" ] || [ "$operation_id" = "null" ]; then
            echo "::error::Unexpected response from Open Cloud: $response"
            exit 1
          fi
          echo "Operation started: $operation_id"

          for attempt in $(seq 1 60); do
            status=$(curl -sS -H "x-api-key: ${ROBLOX_API_KEY}" \
              "https://apis.roblox.com/assets/v1/operations/${operation_id}")
            done=$(jq -r '.done // false' <<<"$status")
            if [ "$done" = "true" ]; then
              err=$(jq -r '.error // empty' <<<"$status")
              if [ -n "$err" ] && [ "$err" != "null" ]; then
                echo "::error::Publish failed: $status"
                exit 1
              fi
              echo "Publish complete"
              jq <<<"$status"
              exit 0
            fi
            sleep 3
          done

          echo "::error::Timed out waiting for publish operation to complete"
          exit 1
